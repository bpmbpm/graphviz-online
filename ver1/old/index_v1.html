<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphviz Online — поддержка image=</title>

  <!-- Библиотека d3 для работы с SVG -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <!-- Ядро WebAssembly Graphviz (загружается как worker-скрипт) -->
  <script src="https://cdn.jsdelivr.net/npm/@hpcc-js/wasm@2/dist/graphviz.umd.js" type="javascript/worker"></script>

  <!-- Библиотека d3-graphviz: рендеринг dot-кода в SVG с поддержкой addImage() -->
  <script src="https://cdn.jsdelivr.net/npm/d3-graphviz@5/build/d3-graphviz.js"></script>

  <style>
    /* Основные стили страницы */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 8px;
      background: #f5f5f5;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      color: #333;
    }

    /* Область редактора: слева — текст, справа — граф */
    #layout {
      display: flex;
      gap: 8px;
      height: calc(100vh - 80px);
    }

    /* Левая панель: редактор кода dot */
    #editor-panel {
      display: flex;
      flex-direction: column;
      width: 380px;
      min-width: 200px;
      flex-shrink: 0;
    }

    #dot-editor {
      flex: 1;
      resize: none;
      font-family: "Courier New", monospace;
      font-size: 13px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    /* Кнопки управления */
    #controls {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #btn-render {
      background: #4CAF50;
      color: white;
    }

    #btn-render:hover {
      background: #388E3C;
    }

    #btn-share {
      background: #2196F3;
      color: white;
    }

    #btn-share:hover {
      background: #1565C0;
    }

    /* Сообщения об ошибках */
    #error-msg {
      color: #c00;
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
    }

    /* Правая панель: область отображения SVG-графа */
    #graph-panel {
      flex: 1;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: auto;
      position: relative;
    }

    /* Контейнер SVG внутри правой панели */
    #graph {
      width: 100%;
      height: 100%;
    }

    /* Подсказка о ссылке */
    #share-hint {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>

<h1>Graphviz Online — поддержка URL-параметра и тега image="</h1>

<div id="layout">

  <!-- Левая панель: редактор dot-кода -->
  <div id="editor-panel">
    <textarea id="dot-editor" spellcheck="false"></textarea>

    <div id="controls">
      <!-- Кнопка: отрисовать граф -->
      <button id="btn-render" onclick="zapustit()">Отрисовать</button>

      <!-- Кнопка: сформировать ссылку с текущим кодом dot -->
      <button id="btn-share" onclick="sozdat_ssylku()">Получить ссылку</button>
    </div>

    <!-- Область для сообщения об ошибке при рендеринге -->
    <div id="error-msg"></div>

    <!-- Подсказка: сгенерированная ссылка -->
    <div id="share-hint"></div>
  </div>

  <!-- Правая панель: граф -->
  <div id="graph-panel">
    <div id="graph"></div>
  </div>

</div>

<script>
  // ========================================================
  // Пример кода dot по умолчанию (без изображений)
  // Используется если в URL не передан параметр с кодом
  // ========================================================
  var DOT_PO_UMOLCHANIYU = 'digraph G {\n  rankdir=LR;\n  node [shape=box];\n  A -> B -> C;\n  A -> C;\n}';

  // ========================================================
  // Читаем код dot из URL-параметра при загрузке страницы
  // Поддерживаемый формат: ?dot=<URL-encoded DOT code>
  // или хэш: #<URL-encoded DOT code>
  // ========================================================
  function poluchit_dot_iz_url() {
    // Сначала проверяем GET-параметр ?dot=...
    var params = new URLSearchParams(window.location.search);
    var dotIzParams = params.get('dot');
    if (dotIzParams) {
      return dotIzParams;
    }

    // Затем проверяем хэш (fragment): #...
    var hash = window.location.hash;
    if (hash && hash.length > 1) {
      // Убираем символ # в начале и декодируем
      return decodeURIComponent(hash.substring(1));
    }

    // Если ничего нет — возвращаем пример по умолчанию
    return DOT_PO_UMOLCHANIYU;
  }

  // ========================================================
  // Извлекаем все URL изображений из кода dot
  // Ищем атрибуты вида: image="https://..." или image='...'
  // Возвращаем массив строк-URL (без дубликатов)
  // ========================================================
  function izvlech_url_izobrazheny(dotKod) {
    var spIsok = [];
    // Регулярное выражение: ищем image="..." или image='...'
    var regex = /image\s*=\s*["']([^"']+)["']/gi;
    var sovpadenie;
    while ((sovpadenie = regex.exec(dotKod)) !== null) {
      var url = sovpadenie[1];
      // Добавляем только если ещё не в списке
      if (spIsok.indexOf(url) === -1) {
        spIsok.push(url);
      }
    }
    return spIsok;
  }

  // ========================================================
  // Загружаем одно изображение и получаем его размеры
  // Возвращает Promise, который резолвится объектом {url, width, height}
  // ========================================================
  function zagrusit_izobrazhenie(url) {
    return new Promise(function(resolve) {
      var img = new Image();

      img.onload = function() {
        resolve({
          url: url,
          width: img.naturalWidth,
          height: img.naturalHeight
        });
      };

      img.onerror = function() {
        // Если изображение не загрузилось — используем размеры по умолчанию
        // Это позволяет продолжить рендеринг даже при ошибке загрузки
        console.warn('Не удалось загрузить изображение: ' + url);
        resolve({
          url: url,
          width: 100,
          height: 100
        });
      };

      img.src = url;
    });
  }

  // ========================================================
  // Главная функция: рендеринг dot-кода в SVG
  // 1. Извлекаем все URL изображений из кода
  // 2. Загружаем их для получения размеров
  // 3. Регистрируем в d3-graphviz через addImage()
  // 4. Запускаем рендеринг
  // ========================================================
  function zapustit() {
    // Получаем текущий код dot из редактора
    var dotKod = document.getElementById('dot-editor').value;

    // Очищаем предыдущее сообщение об ошибке
    document.getElementById('error-msg').textContent = '';

    // Извлекаем все URL изображений
    var urlIzobrazheny = izvlech_url_izobrazheny(dotKod);

    if (urlIzobrazheny.length === 0) {
      // Изображений нет — рендерим напрямую без addImage
      vypolnit_render(dotKod, []);
    } else {
      // Загружаем все изображения параллельно для получения размеров
      var obeshchaniya = [];
      for (var i = 0; i < urlIzobrazheny.length; i++) {
        obeshchaniya.push(zagrusit_izobrazhenie(urlIzobrazheny[i]));
      }

      Promise.all(obeshchaniya).then(function(razmery) {
        vypolnit_render(dotKod, razmery);
      });
    }
  }

  // ========================================================
  // Выполняет непосредственный рендеринг через d3-graphviz
  // razmery — массив объектов {url, width, height}
  // ========================================================
  function vypolnit_render(dotKod, razmery) {
    // Создаём объект рендерера d3-graphviz на контейнере #graph
    var renderer = d3.select('#graph').graphviz({
      useWorker: false,
      fit: true,
      zoom: true
    });

    // Регистрируем изображения: это необходимо для корректного расчёта
    // layout в WASM — без этого Graphviz не знает размеры изображений
    for (var i = 0; i < razmery.length; i++) {
      var r = razmery[i];
      // addImage принимает путь/URL, ширину и высоту в пикселях
      renderer.addImage(r.url, r.width + 'px', r.height + 'px');
    }

    // Назначаем обработчик ошибок рендеринга
    renderer.onerror(function(soobshchenie) {
      document.getElementById('error-msg').textContent = 'Ошибка: ' + soobshchenie;
    });

    // Запускаем рендеринг: dot-код -> SVG
    renderer.renderDot(dotKod);
  }

  // ========================================================
  // Формирует и отображает URL с текущим кодом dot
  // Параметр передаётся как хэш (#...) для совместимости
  // со стандартным поведением dreampuf/GraphvizOnline
  // ========================================================
  function sozdat_ssylku() {
    var dotKod = document.getElementById('dot-editor').value;
    // Кодируем код dot для безопасной передачи в URL
    var encoded = encodeURIComponent(dotKod);
    var base = window.location.origin + window.location.pathname;
    var ssylka = base + '#' + encoded;

    // Показываем ссылку под редактором
    document.getElementById('share-hint').textContent = ssylka;

    // Также копируем в буфер обмена (если браузер поддерживает)
    if (navigator.clipboard) {
      navigator.clipboard.writeText(ssylka).then(function() {
        document.getElementById('share-hint').textContent = 'Скопировано: ' + ssylka;
      }).catch(function() {
        // Тихо игнорируем ошибку копирования
      });
    }
  }

  // ========================================================
  // Инициализация при загрузке страницы
  // ========================================================
  function init() {
    // Загружаем код dot из URL или используем пример по умолчанию
    var dotKod = poluchit_dot_iz_url();
    document.getElementById('dot-editor').value = dotKod;

    // Автоматически отрисовываем граф при загрузке
    zapustit();
  }

  // Запускаем инициализацию после загрузки DOM
  window.onload = init;
</script>

</body>
</html>
